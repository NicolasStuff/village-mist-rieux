app = "village-mist-rieux"
primary_region = "cdg"

[env]
  NODE_ENV = "production"
  DATABASE_PATH = "/data/village.db"

[[mounts]]
  source = "village_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"
